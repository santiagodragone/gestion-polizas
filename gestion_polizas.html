<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de Pólizas</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1e2333;
    --border: #2a3045;
    --accent: #00e5a0;
    --accent2: #0091ff;
    --warn: #ffb830;
    --danger: #ff4d6a;
    --text: #e8eaf0;
    --muted: #7a8099;
    --mono: 'DM Mono', monospace;
    --sans: 'Sora', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

  /* Header */
  header {
    padding: 1.5rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface);
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 12px var(--accent); }
  .logo h1 { font-size: 1rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
  .logo span { color: var(--muted); font-weight: 300; }
  .last-update { font-family: var(--mono); font-size: 11px; color: var(--muted); }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; padding: 1.5rem 2rem; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.2rem 1.4rem;
    transition: border-color 0.2s;
  }
  .stat-card:hover { border-color: var(--accent); }
  .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 0.5rem; }
  .stat-value { font-family: var(--mono); font-size: 2rem; font-weight: 500; line-height: 1; }
  .stat-value.green { color: var(--accent); }
  .stat-value.yellow { color: var(--warn); }
  .stat-value.red { color: var(--danger); }
  .stat-value.blue { color: var(--accent2); }

  /* Filters */
  .filters { padding: 0 2rem 1rem; display: flex; gap: 0.6rem; align-items: center; flex-wrap: wrap; }
  .filter-btn {
    padding: 0.4rem 1rem; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); font-family: var(--sans); font-size: 12px;
    cursor: pointer; transition: all 0.15s; letter-spacing: 0.03em;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
  .filter-btn.warn.active { background: var(--warn); border-color: var(--warn); }
  .filter-btn.danger.active { background: var(--danger); border-color: var(--danger); }
  .filter-btn.blue.active { background: var(--accent2); border-color: var(--accent2); }
  .search-wrap { margin-left: auto; }
  .search-wrap input {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 0.4rem 1rem; border-radius: 20px; font-family: var(--sans); font-size: 12px;
    outline: none; width: 200px; transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent2); }
  .search-wrap input::placeholder { color: var(--muted); }

  /* Table */
  .table-wrap { padding: 0 2rem 2rem; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr { border-bottom: 1px solid var(--border); }
  th { padding: 0.7rem 1rem; text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); font-weight: 500; white-space: nowrap; }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
    cursor: default;
  }
  tbody tr:hover { background: var(--surface2); }
  td { padding: 0.9rem 1rem; vertical-align: middle; }
  td.mono { font-family: var(--mono); font-size: 12px; }

  /* Badges */
  .badge {
    display: inline-block; padding: 3px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.05em;
  }
  .badge.urgente { background: rgba(255,77,106,0.15); color: var(--danger); border: 1px solid rgba(255,77,106,0.3); }
  .badge.proximo { background: rgba(255,184,48,0.15); color: var(--warn); border: 1px solid rgba(255,184,48,0.3); }
  .badge.al-dia { background: rgba(0,229,160,0.1); color: var(--accent); border: 1px solid rgba(0,229,160,0.2); }

  /* Enviado badge */
  .enviado-si { color: var(--accent); font-family: var(--mono); font-size: 12px; }
  .enviado-no { color: var(--muted); font-family: var(--mono); font-size: 12px; }

  /* Buttons */
  .btn-wpp {
    display: inline-block; padding: 5px 14px; border-radius: 6px;
    background: rgba(0,229,160,0.1); color: var(--accent);
    border: 1px solid rgba(0,229,160,0.25); font-size: 11px; font-weight: 600;
    text-decoration: none; transition: all 0.15s; white-space: nowrap;
    letter-spacing: 0.03em;
  }
  .btn-wpp:hover { background: var(--accent); color: #000; }
  .btn-wpp.disabled { opacity: 0.3; pointer-events: none; }

  .btn-enviado {
    padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); font-size: 11px; font-family: var(--sans);
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .btn-enviado:hover { border-color: var(--accent); color: var(--accent); }
  .btn-enviado.marcado { background: rgba(0,229,160,0.1); color: var(--accent); border-color: rgba(0,229,160,0.3); }

  /* Loading / empty */
  .loading { text-align: center; padding: 4rem; color: var(--muted); font-family: var(--mono); font-size: 13px; }
  .loading-dot { display: inline-block; animation: pulse 1.2s infinite; }
  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }

  .empty { text-align: center; padding: 3rem; color: var(--muted); font-size: 13px; }

  /* Refresh */
  .btn-refresh {
    padding: 0.4rem 1rem; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); font-family: var(--sans); font-size: 12px;
    cursor: pointer; transition: all 0.15s;
  }
  .btn-refresh:hover { border-color: var(--accent2); color: var(--accent2); }

  .dias-cell { font-family: var(--mono); font-size: 12px; }
  .dias-urgente { color: var(--danger); }
  .dias-proximo { color: var(--warn); }
  .dias-ok { color: var(--accent); }

  /* Progress bar de enviados */
  .progress-wrap { display: flex; align-items: center; gap: 10px; margin-left: 1rem; }
  .progress-bar { width: 80px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.5s; }
  .progress-label { font-family: var(--mono); font-size: 11px; color: var(--muted); }

  @media (max-width: 768px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    header { flex-direction: column; gap: 0.5rem; align-items: flex-start; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    <h1>Gestión de Pólizas <span>/ Cobranza</span></h1>
  </div>
  <div style="display:flex;align-items:center;gap:1rem">
    <span class="last-update" id="last-update">Cargando...</span>
    <button class="btn-refresh" onclick="cargarDatos()">↻ Actualizar</button>
  </div>
</header>

<div class="stats">
  <div class="stat-card">
    <div class="stat-label">Total clientes</div>
    <div class="stat-value blue" id="stat-total">—</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Urgentes</div>
    <div class="stat-value red" id="stat-urgente">—</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Próximos a vencer</div>
    <div class="stat-value yellow" id="stat-proximo">—</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Mensajes enviados</div>
    <div class="stat-value green" id="stat-enviado">—</div>
  </div>
</div>

<div class="filters">
  <button class="filter-btn active" onclick="filtrar('todos', this)">Todos</button>
  <button class="filter-btn danger" onclick="filtrar('urgente', this)">Urgentes</button>
  <button class="filter-btn warn" onclick="filtrar('proximo', this)">Próximos</button>
  <button class="filter-btn" onclick="filtrar('al dia', this)">Al día</button>
  <button class="filter-btn blue" onclick="filtrar('pendiente', this)">Sin enviar</button>
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Buscar cliente..." oninput="renderTabla()">
  </div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <span class="progress-label" id="progress-label">0%</span>
  </div>
</div>

<div class="table-wrap">
  <div id="loading" class="loading">
    <span class="loading-dot">▪</span>
    <span class="loading-dot">▪</span>
    <span class="loading-dot">▪</span>
    <span style="margin-left:8px">Conectando con Google Sheets...</span>
  </div>
  <table id="tabla" style="display:none">
    <thead>
      <tr>
        <th>Cliente</th>
        <th>Compañía</th>
        <th>Nro. póliza</th>
        <th>Monto</th>
        <th>Vencimiento</th>
        <th>Días</th>
        <th>Estado</th>
        <th>Enviado</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="empty" class="empty" style="display:none">No hay clientes que coincidan con el filtro.</div>
</div>

<script>
const CSV_URL = "https://api.allorigins.win/raw?url=https://docs.google.com/spreadsheets/d/e/2PACX-1vSj8aWHgZBr7Klm2_Lb58TDrcRz4OAynXe_KQhxRpZNf9V8tiefESLQQq8DDLu2drDdFLE-9JszeeZT/pub?gid=312151199%26single=true%26output=csv";

let datos = [];
let filtroActivo = 'todos';
let enviados = {};

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/"/g,''));
  return lines.slice(1).map(line => {
    const vals = [];
    let cur = '', inQ = false;
    for (let c of line) {
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
      else cur += c;
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = (vals[i] || '').replace(/"/g,''));
    return obj;
  }).filter(r => r['ID'] && r['ID'] !== 'ID');
}

async function cargarDatos() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('tabla').style.display = 'none';
  document.getElementById('empty').style.display = 'none';
  try {
    const resp = await fetch(CSV_URL + '&t=' + Date.now());
    const text = await resp.text();
    datos = parseCSV(text);
    datos.forEach(r => {
      if (!enviados[r['ID']]) {
        enviados[r['ID']] = (r['Enviado WPP'] || '').toLowerCase() === 'sí' || (r['Enviado WPP'] || '').toLowerCase() === 'si';
      }
    });
    actualizarStats();
    renderTabla();
    document.getElementById('last-update').textContent = 'Actualizado ' + new Date().toLocaleTimeString('es-AR');
  } catch(e) {
    document.getElementById('loading').innerHTML = '⚠ Error al cargar datos. Verificá la conexión.';
  }
}

function actualizarStats() {
  const total = datos.length;
  const urgentes = datos.filter(r => estadoNorm(r) === 'urgente').length;
  const proximos = datos.filter(r => estadoNorm(r) === 'proximo').length;
  const enviadosCount = datos.filter(r => enviados[r['ID']]).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-urgente').textContent = urgentes;
  document.getElementById('stat-proximo').textContent = proximos;
  document.getElementById('stat-enviado').textContent = enviadosCount + '/' + total;
  const pct = total ? Math.round(enviadosCount / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = pct + '%';
}

function estadoNorm(r) {
  const e = (r['Estado'] || '').toLowerCase();
  if (e.includes('urgente')) return 'urgente';
  if (e.includes('pr') || e.includes('pago') || e.includes('pagar')) return 'proximo';
  return 'al dia';
}

function filtrar(f, btn) {
  filtroActivo = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTabla();
}

function renderTabla() {
  const busqueda = (document.getElementById('search').value || '').toLowerCase();
  let filas = datos.filter(r => {
    const estado = estadoNorm(r);
    if (filtroActivo === 'urgente' && estado !== 'urgente') return false;
    if (filtroActivo === 'proximo' && estado !== 'proximo') return false;
    if (filtroActivo === 'al dia' && estado !== 'al dia') return false;
    if (filtroActivo === 'pendiente' && enviados[r['ID']]) return false;
    if (busqueda) {
      const texto = (r['Nombre completo'] + r['Compañía'] + r['Nro. póliza']).toLowerCase();
      if (!texto.includes(busqueda)) return false;
    }
    return true;
  });

  document.getElementById('loading').style.display = 'none';
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  if (filas.length === 0) {
    document.getElementById('tabla').style.display = 'none';
    document.getElementById('empty').style.display = 'block';
    return;
  }

  document.getElementById('tabla').style.display = 'table';
  document.getElementById('empty').style.display = 'none';

  filas.forEach(r => {
    const estado = estadoNorm(r);
    const dias = parseInt(r['Días restantes']) || 0;
    const id = r['ID'];
    const nombre = r['Nombre completo'] || '';
    const wpp = r['WhatsApp'] || '';
    const comp = r['Compañía'] || '';
    const poliza = r['Nro. póliza'] || '';
    const monto = r['Monto ($)'] || '';
    const venc = r['Vencimiento'] || '';
    const esEnviado = enviados[id];

    const msg = encodeURIComponent(`Hola ${nombre}, tu poliza ${poliza} de ${comp} vence el ${venc}. Monto: $${monto}. Cualquier consulta estamos a disposicion.`);
    const wppLink = `https://wa.me/${wpp}?text=${msg}`;

    let badgeClass = estado === 'urgente' ? 'urgente' : estado === 'proximo' ? 'proximo' : 'al-dia';
    let badgeLabel = estado === 'urgente' ? 'URGENTE' : estado === 'proximo' ? 'PRÓXIMO' : 'AL DÍA';
    let diasClass = estado === 'urgente' ? 'dias-urgente' : estado === 'proximo' ? 'dias-proximo' : 'dias-ok';

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><strong>${nombre}</strong></td>
      <td style="color:var(--muted)">${comp}</td>
      <td class="mono">${poliza}</td>
      <td class="mono">$${monto}</td>
      <td class="mono">${venc}</td>
      <td class="dias-cell ${diasClass}">${dias}d</td>
      <td><span class="badge ${badgeClass}">${badgeLabel}</span></td>
      <td>${esEnviado ? '<span class="enviado-si">✓ Sí</span>' : '<span class="enviado-no">— No</span>'}</td>
      <td style="display:flex;gap:6px;align-items:center">
        <a href="${wppLink}" target="_blank" class="btn-wpp ${esEnviado ? 'disabled' : ''}">Enviar WPP</a>
        <button class="btn-enviado ${esEnviado ? 'marcado' : ''}" onclick="toggleEnviado('${id}', this)">
          ${esEnviado ? '✓ Enviado' : 'Marcar'}
        </button>
      </td>
    `;
    tbody.appendChild(tr);
  });

  actualizarStats();
}

function toggleEnviado(id, btn) {
  enviados[id] = !enviados[id];
  renderTabla();
}

cargarDatos();
</script>
</body>
</html>
