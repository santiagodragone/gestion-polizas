<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Renovaciones — Dragone Seguros</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:#0d1b2a;--navy2:#162032;--navy3:#1e2d42;
    --gold:#c8a84b;--white:#f5f2eb;--muted:#8a9bb0;--border:rgba(200,168,75,0.18);
    --danger:#e05555;--ok:#4caf82;--warn:#e8a83a;
    --serif:'Playfair Display',Georgia,serif;--sans:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--navy);color:var(--white);font-family:var(--sans);min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 0%,rgba(200,168,75,0.07) 0%,transparent 50%),radial-gradient(ellipse at 85% 100%,rgba(26,74,122,0.18) 0%,transparent 50%);pointer-events:none;z-index:0;}
  header{position:relative;z-index:10;padding:1.2rem 2.5rem;border-bottom:1px solid var(--border);background:rgba(13,27,42,0.97);display:flex;align-items:center;justify-content:space-between;}
  .brand{display:flex;align-items:center;gap:12px;text-decoration:none;color:inherit;}
  .brand-shield{width:36px;height:36px;clip-path:polygon(50% 0%,100% 15%,100% 70%,50% 100%,0% 70%,0% 15%);background:rgba(200,168,75,0.1);border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:16px;font-weight:700;color:var(--gold);}
  .brand-text h1{font-family:var(--serif);font-size:.95rem;font-weight:600;color:var(--white);}
  .brand-text span{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.18em;text-transform:uppercase;}
  .back-btn{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);border:1px solid var(--border);padding:5px 12px;border-radius:3px;text-decoration:none;transition:color .2s,border-color .2s;}
  .back-btn:hover{color:var(--gold);border-color:var(--gold);}
  .page{position:relative;z-index:1;padding:2.5rem 2.5rem 3rem;}
  .page-top{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:2rem;gap:1rem;flex-wrap:wrap;}
  .page-eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:.5rem;display:flex;align-items:center;gap:8px;}
  .page-eyebrow::before{content:'';width:24px;height:1px;background:var(--gold);display:inline-block;}
  .page-title{font-family:var(--serif);font-size:clamp(1.5rem,3vw,2.2rem);font-weight:700;color:var(--white);}
  .page-title em{font-style:italic;color:var(--gold);}
  .top-actions{display:flex;gap:.8rem;align-items:center;flex-wrap:wrap;}
  .search-wrap{position:relative;}
  .search-wrap input{background:var(--navy2);border:1px solid var(--border);color:var(--white);padding:.45rem 1rem .45rem 2.2rem;border-radius:4px;font-family:var(--sans);font-size:12px;outline:none;width:200px;transition:border-color .2s;}
  .search-wrap input:focus{border-color:var(--gold);}
  .search-wrap input::placeholder{color:var(--muted);}
  .search-icon{position:absolute;left:.7rem;top:50%;transform:translateY(-50%);font-size:13px;color:var(--muted);pointer-events:none;}
  .btn-nuevo{padding:.45rem 1.2rem;border-radius:4px;background:var(--gold);color:var(--navy);border:none;font-family:var(--sans);font-size:12px;font-weight:500;cursor:pointer;transition:background .15s;white-space:nowrap;}
  .btn-nuevo:hover{background:#e8c96b;}
  .stats-bar{display:flex;gap:0;margin-bottom:2rem;border:1px solid var(--border);border-radius:8px;overflow:hidden;}
  .stat-item{flex:1;padding:1rem 1.4rem;border-right:1px solid var(--border);background:var(--navy2);}
  .stat-item:last-child{border-right:none;}
  .stat-val{font-family:var(--serif);font-size:1.8rem;font-weight:600;color:var(--gold);line-height:1;}
  .stat-val.verde{color:var(--ok);}
  .stat-val.rojo{color:var(--danger);}
  .stat-val.naranja{color:var(--warn);}
  .stat-lbl{font-size:11px;color:var(--muted);margin-top:4px;}
  .filtros-wrap{display:flex;gap:.5rem;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center;}
  .filtros-label{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.1em;margin-right:.3rem;}
  .filtro-btn{padding:.35rem .85rem;border-radius:3px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:var(--sans);font-size:11px;cursor:pointer;transition:all .15s;}
  .filtro-btn:hover{border-color:var(--gold);color:var(--gold);}
  .filtro-btn.active{background:rgba(200,168,75,0.12);border-color:var(--gold);color:var(--gold);}
  .tabla-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--border);}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  thead tr{background:var(--navy3);}
  thead th{padding:.75rem 1rem;text-align:left;font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap;}
  tbody tr{background:var(--navy2);transition:background .12s;border-bottom:1px solid rgba(200,168,75,0.07);}
  tbody tr:last-child{border-bottom:none;}
  tbody tr:hover{background:var(--navy3);}
  td{padding:.7rem 1rem;vertical-align:middle;}
  .td-mes{font-family:var(--mono);font-size:11px;color:var(--gold);white-space:nowrap;}
  .td-compania{font-weight:500;color:var(--white);}
  .td-asegurado{color:var(--white);}
  .td-poliza{font-family:var(--mono);font-size:11px;color:var(--muted);}
  .td-renovador{font-size:12px;color:var(--muted);}
  .td-producto{font-size:11px;padding:2px 8px;border-radius:3px;background:rgba(200,168,75,0.08);border:1px solid var(--border);color:var(--gold);white-space:nowrap;display:inline-block;}
  .td-obs{font-size:11px;color:var(--muted);font-style:italic;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid;white-space:nowrap;cursor:pointer;transition:all .15s;font-family:var(--sans);}
  .badge.si{color:var(--ok);border-color:rgba(76,175,130,0.4);background:rgba(76,175,130,0.08);}
  .badge.no{color:var(--danger);border-color:rgba(224,85,85,0.4);background:rgba(224,85,85,0.08);}
  .badge.pend{color:var(--warn);border-color:rgba(232,168,58,0.4);background:rgba(232,168,58,0.08);}
  .badge:hover{filter:brightness(1.2);}
  .badge-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;}
  .td-acciones{display:flex;gap:.4rem;align-items:center;}
  .btn-accion{padding:3px 8px;border-radius:3px;border:1px solid var(--border);background:transparent;font-size:10px;cursor:pointer;transition:all .15s;font-family:var(--mono);color:var(--muted);}
  .btn-accion:hover{color:var(--gold);border-color:var(--gold);}
  .btn-accion.del:hover{color:var(--danger);border-color:var(--danger);}
  .btn-wpp{padding:3px 8px;border-radius:3px;border:1px solid rgba(76,175,130,0.3);background:rgba(76,175,130,0.08);font-size:10px;cursor:pointer;transition:all .15s;font-family:var(--mono);color:var(--ok);}
  .btn-wpp:hover{background:rgba(76,175,130,0.15);}
  .empty{text-align:center;padding:4rem 2rem;color:var(--muted);font-size:13px;}
  .empty-icon{font-size:2.5rem;margin-bottom:1rem;opacity:.4;}
  .loading{text-align:center;padding:4rem;color:var(--muted);font-family:var(--mono);font-size:12px;}
  @keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
  .dot{animation:pulse 1.2s infinite;display:inline-block;}
  .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:100;align-items:center;justify-content:center;padding:1rem;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--navy2);border:1px solid var(--border);border-radius:10px;padding:2rem;width:100%;max-width:520px;animation:modalIn .2s ease;}
  @keyframes modalIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
  .modal-title{font-family:var(--serif);font-size:1.2rem;font-weight:700;color:var(--white);margin-bottom:1.5rem;}
  .modal-title span{color:var(--gold);font-style:italic;}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:.9rem;margin-bottom:.5rem;}
  .form-group{display:flex;flex-direction:column;gap:.35rem;}
  .form-group.full{grid-column:1/-1;}
  label{font-size:11px;color:var(--muted);letter-spacing:.08em;font-family:var(--mono);}
  input,textarea,select{background:var(--navy3);border:1px solid var(--border);color:var(--white);padding:.5rem .8rem;border-radius:4px;font-family:var(--sans);font-size:13px;outline:none;transition:border-color .2s;}
  input:focus,textarea:focus,select:focus{border-color:var(--gold);}
  input::placeholder,textarea::placeholder{color:var(--muted);}
  textarea{resize:vertical;min-height:60px;}
  select option{background:var(--navy2);}
  .modal-actions{display:flex;gap:.7rem;justify-content:flex-end;margin-top:1.5rem;}
  .btn-cancel{padding:.5rem 1.2rem;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:var(--sans);font-size:12px;cursor:pointer;transition:all .15s;}
  .btn-cancel:hover{border-color:var(--muted);color:var(--white);}
  .btn-save{padding:.5rem 1.4rem;border-radius:4px;border:none;background:var(--gold);color:var(--navy);font-family:var(--sans);font-size:12px;font-weight:500;cursor:pointer;transition:background .15s;}
  .btn-save:hover{background:#e8c96b;}
  .btn-save:disabled{opacity:.5;cursor:default;}
  .toast{position:fixed;bottom:2rem;right:2rem;z-index:200;background:var(--navy3);border:1px solid var(--gold);color:var(--white);padding:.7rem 1.2rem;border-radius:6px;font-size:12px;font-family:var(--sans);opacity:0;transform:translateY(8px);transition:opacity .3s,transform .3s;}
  .toast.show{opacity:1;transform:translateY(0);}
  footer{position:relative;z-index:1;padding:1.2rem 2.5rem;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .footer-brand{font-family:var(--serif);font-size:12px;color:var(--muted);}
  .footer-ver{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.1em;}
  @media(max-width:700px){header,.page,footer{padding-left:1.2rem;padding-right:1.2rem;}.form-grid{grid-template-columns:1fr;}.stats-bar{flex-wrap:wrap;}.stat-item{flex:1 1 40%;}.top-actions{width:100%;}.search-wrap input{width:100%;}td,th{font-size:11px;padding:.5rem .6rem;}}
</style>
</head>
<body>

<header>
  <a class="brand" href="index.html">
    <div class="brand-shield">D</div>
    <div class="brand-text"><h1>Dragone Seguros</h1><span>Sistema de gestión</span></div>
  </a>
  <a class="back-btn" href="index.html">← Volver al inicio</a>
</header>

<div class="page">
  <div class="page-top">
    <div class="page-title-wrap">
      <div class="page-eyebrow">Módulo</div>
      <div class="page-title">Control de <em>Renovaciones</em></div>
    </div>
    <div class="top-actions">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search" placeholder="Buscar asegurado, póliza..." oninput="renderTabla()">
      </div>
      <button class="btn-nuevo" onclick="abrirModal()">+ Nueva renovación</button>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-item"><div class="stat-val" id="stat-total">—</div><div class="stat-lbl">Total renovaciones</div></div>
    <div class="stat-item"><div class="stat-val verde" id="stat-si">—</div><div class="stat-lbl">WPP enviado</div></div>
    <div class="stat-item"><div class="stat-val naranja" id="stat-pend">—</div><div class="stat-lbl">Pendientes</div></div>
    <div class="stat-item"><div class="stat-val rojo" id="stat-no">—</div><div class="stat-lbl">Sin enviar</div></div>
  </div>

  <div class="filtros-wrap" id="filtros-mes"><span class="filtros-label">MES</span></div>
  <div class="filtros-wrap" id="filtros-estado" style="margin-top:-.5rem">
    <span class="filtros-label">ESTADO WPP</span>
    <button class="filtro-btn active" onclick="setFiltroEstado('todos',this)">Todos</button>
    <button class="filtro-btn" onclick="setFiltroEstado('Sí',this)">✓ Enviado</button>
    <button class="filtro-btn" onclick="setFiltroEstado('Pendiente',this)">⏳ Pendiente</button>
    <button class="filtro-btn" onclick="setFiltroEstado('No',this)">✕ Sin enviar</button>
  </div>

  <div id="contenido">
    <div class="loading"><span class="dot">▪</span><span class="dot">▪</span><span class="dot">▪</span><span style="margin-left:8px">Cargando renovaciones...</span></div>
  </div>
</div>

<footer>
  <span class="footer-brand">Dragone Seguros — Renovaciones</span>
  <span class="footer-ver">v1.0 · 2025</span>
</footer>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-title" id="modal-title">Nueva <span>renovación</span></div>
    <div class="form-grid">
      <div class="form-group">
        <label>Mes *</label>
        <select id="f-mes">
          <option value="">Seleccioná...</option>
          <option>Enero</option><option>Febrero</option><option>Marzo</option>
          <option>Abril</option><option>Mayo</option><option>Junio</option>
          <option>Julio</option><option>Agosto</option><option>Septiembre</option>
          <option>Octubre</option><option>Noviembre</option><option>Diciembre</option>
        </select>
      </div>
      <div class="form-group">
        <label>Compañía *</label>
        <input type="text" id="f-compania" placeholder="Ej: Sancor, Zurich...">
      </div>
      <div class="form-group full">
        <label>Asegurado *</label>
        <input type="text" id="f-asegurado" placeholder="Nombre del asegurado">
      </div>
      <div class="form-group">
        <label>Póliza</label>
        <input type="text" id="f-poliza" placeholder="Nº de póliza">
      </div>
      <div class="form-group">
        <label>Renovada por</label>
        <input type="text" id="f-renovador" placeholder="Nombre del productor">
      </div>
      <div class="form-group">
        <label>Producto</label>
        <input type="text" id="f-producto" placeholder="Ej: Hogar, Auto, Vida...">
      </div>
      <div class="form-group">
        <label>¿WPP enviado?</label>
        <select id="f-enviada">
          <option value="Pendiente">Pendiente</option>
          <option value="Sí">Sí</option>
          <option value="No">No</option>
        </select>
      </div>
      <div class="form-group full">
        <label>Observaciones</label>
        <textarea id="f-obs" placeholder="Notas adicionales..."></textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-save" id="btn-guardar" onclick="guardar()">Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxFydbgOT0KDGjMaiE8UrJF7LCVZH3hZzwCAO4QriMnDMjfRB5PVYzqSZMlDFwv8rt8/exec";
const MESES_ORDEN = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

let renovaciones = [];
let editandoId   = null;
let filtroMes    = "todos";
let filtroEstado = "todos";

// ── CARGA ─────────────────────────────────────────────────────────────────
async function cargarDatos() {
  try {
    const resp = await fetch(SCRIPT_URL + "?hoja=Renovaciones&t=" + Date.now());
    const raw  = await resp.json();
    // Cols: id | mes | compania | asegurado | poliza | renovador | producto | enviada | obs
    renovaciones = raw.slice(1).map(row => ({
      id:        String(row[0]||'').trim(),
      mes:       String(row[1]||'').trim(),
      compania:  String(row[2]||'').trim(),
      asegurado: String(row[3]||'').trim(),
      poliza:    String(row[4]||'').trim(),
      renovador: String(row[5]||'').trim(),
      producto:  String(row[6]||'').trim(),
      enviada:   String(row[7]||'Pendiente').trim(),
      obs:       String(row[8]||'').trim(),
    })).filter(r => r.asegurado !== '');
    renderTabla();
  } catch(e) {
    document.getElementById('contenido').innerHTML = '<div class="empty"><div class="empty-icon">⚠</div><p>Error al cargar renovaciones.</p></div>';
  }
}

// ── FILTROS ───────────────────────────────────────────────────────────────
function renderFiltrosMes() {
  const meses = [...new Set(renovaciones.map(r=>r.mes).filter(Boolean))]
    .sort((a,b) => MESES_ORDEN.indexOf(a) - MESES_ORDEN.indexOf(b));
  const wrap = document.getElementById('filtros-mes');
  wrap.innerHTML = '<span class="filtros-label">MES</span>';
  const btnT = document.createElement('button');
  btnT.className = 'filtro-btn' + (filtroMes==='todos'?' active':'');
  btnT.textContent = 'Todos';
  btnT.onclick = () => setFiltroMes('todos', btnT);
  wrap.appendChild(btnT);
  meses.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'filtro-btn' + (filtroMes===m?' active':'');
    btn.textContent = m;
    btn.onclick = () => setFiltroMes(m, btn);
    wrap.appendChild(btn);
  });
}

function setFiltroMes(val, btn) {
  filtroMes = val;
  document.querySelectorAll('#filtros-mes .filtro-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTabla();
}

function setFiltroEstado(val, btn) {
  filtroEstado = val;
  document.querySelectorAll('#filtros-estado .filtro-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTabla();
}

// ── RENDER ────────────────────────────────────────────────────────────────
function renderTabla() {
  renderFiltrosMes();
  const busqueda = (document.getElementById('search').value||'').toLowerCase();
  const filtrados = renovaciones.filter(r => {
    if (filtroMes !== 'todos' && r.mes !== filtroMes) return false;
    if (filtroEstado !== 'todos' && r.enviada !== filtroEstado) return false;
    if (busqueda) {
      const txt = (r.asegurado+r.compania+r.poliza+r.producto+r.renovador).toLowerCase();
      if (!txt.includes(busqueda)) return false;
    }
    return true;
  });

  document.getElementById('stat-total').textContent = renovaciones.length;
  document.getElementById('stat-si').textContent    = renovaciones.filter(r=>r.enviada==='Sí').length;
  document.getElementById('stat-pend').textContent  = renovaciones.filter(r=>r.enviada==='Pendiente').length;
  document.getElementById('stat-no').textContent    = renovaciones.filter(r=>r.enviada==='No').length;

  if (filtrados.length === 0) {
    document.getElementById('contenido').innerHTML =
      '<div class="empty"><div class="empty-icon">📋</div><p>' +
      (renovaciones.length===0 ? 'Todavía no hay renovaciones registradas.' : 'No hay renovaciones que coincidan con los filtros.') +
      '</p></div>';
    return;
  }

  let html = `<div class="tabla-wrap"><table>
    <thead><tr>
      <th>Mes</th><th>Compañía</th><th>Asegurado</th><th>Póliza</th>
      <th>Renovada por</th><th>Producto</th><th>WPP</th><th>Observaciones</th><th>Acciones</th>
    </tr></thead><tbody>`;

  filtrados.forEach(r => {
    const badgeClass = r.enviada==='Sí' ? 'si' : r.enviada==='No' ? 'no' : 'pend';
    const badgeLabel = r.enviada==='Sí' ? '✓ Enviado' : r.enviada==='No' ? '✕ No enviado' : '⏳ Pendiente';
    html += `<tr>
      <td class="td-mes">${r.mes}</td>
      <td class="td-compania">${r.compania}</td>
      <td class="td-asegurado">${r.asegurado}</td>
      <td class="td-poliza">${r.poliza||'—'}</td>
      <td class="td-renovador">${r.renovador||'—'}</td>
      <td><span class="td-producto">${r.producto||'—'}</span></td>
      <td><span class="badge ${badgeClass}" onclick="ciclarEstado('${r.id}')" title="Click para cambiar estado"><span class="badge-dot"></span>${badgeLabel}</span></td>
      <td class="td-obs" title="${r.obs}">${r.obs||''}</td>
      <td><div class="td-acciones">
        <button class="btn-wpp" onclick="copiarWPP('${r.id}')">📱 WPP</button>
        <button class="btn-accion" onclick="editarRenovacion('${r.id}')">Editar</button>
        <button class="btn-accion del" onclick="eliminarRenovacion('${r.id}')">✕</button>
      </div></td>
    </tr>`;
  });

  html += '</tbody></table></div>';
  document.getElementById('contenido').innerHTML = html;
}

// ── CICLAR ESTADO — usa ID único, no rowIndex ─────────────────────────────
async function ciclarEstado(id) {
  const r = renovaciones.find(x => x.id === id);
  if (!r) return;
  const ciclo = { 'Pendiente':'Sí', 'Sí':'No', 'No':'Pendiente' };
  const nuevoEstado = ciclo[r.enviada] || 'Pendiente';
  r.enviada = nuevoEstado;
  renderTabla();
  try {
    await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({ action:'eliminar_renovacion', id }) });
    await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({
      action:'agregar_renovacion', id,
      mes:r.mes, compania:r.compania, asegurado:r.asegurado,
      poliza:r.poliza, renovador:r.renovador, producto:r.producto,
      enviada:nuevoEstado, obs:r.obs
    })});
    mostrarToast('Estado actualizado: ' + nuevoEstado);
    setTimeout(() => cargarDatos(), 1800);
  } catch(e) {
    mostrarToast('Error al actualizar estado');
  }
}

// ── COPIAR WPP — firma corregida a "Seguros Dragone" ─────────────────────
function copiarWPP(id) {
  const r = renovaciones.find(x => x.id === id);
  if (!r) return;
  const msg =
    '🔄 *Renovación de póliza*\n\n' +
    'Estimado/a *' + r.asegurado + '*, le informamos que su póliza' +
    (r.producto ? ' de *' + r.producto + '*' : '') +
    (r.poliza   ? ' N° ' + r.poliza : '') +
    ' con *' + r.compania + '* corresponde al mes de *' + r.mes + '*.\n\n' +
    'Quedamos a su disposición ante cualquier consulta.\n\n' +
    '_Seguros Dragone_';

  navigator.clipboard.writeText(msg).then(() => {
    mostrarToast('📱 Mensaje copiado — pegalo en WhatsApp');
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = msg;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    mostrarToast('📱 Mensaje copiado');
  });
}

// ── MODAL ─────────────────────────────────────────────────────────────────
function abrirModal() {
  editandoId = null;
  document.getElementById('modal-title').innerHTML = 'Nueva <span>renovación</span>';
  ['f-compania','f-asegurado','f-poliza','f-renovador','f-producto','f-obs'].forEach(id => document.getElementById(id).value='');
  document.getElementById('f-mes').value = '';
  document.getElementById('f-enviada').value = 'Pendiente';
  document.getElementById('modal-overlay').classList.add('open');
}

function editarRenovacion(id) {
  const r = renovaciones.find(x => x.id === id);
  if (!r) return;
  editandoId = id;
  document.getElementById('modal-title').innerHTML = 'Editar <span>renovación</span>';
  document.getElementById('f-mes').value       = r.mes;
  document.getElementById('f-compania').value  = r.compania;
  document.getElementById('f-asegurado').value = r.asegurado;
  document.getElementById('f-poliza').value    = r.poliza;
  document.getElementById('f-renovador').value = r.renovador;
  document.getElementById('f-producto').value  = r.producto;
  document.getElementById('f-enviada').value   = r.enviada;
  document.getElementById('f-obs').value       = r.obs;
  document.getElementById('modal-overlay').classList.add('open');
}

function cerrarModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  editandoId = null;
}

async function guardar() {
  const mes       = document.getElementById('f-mes').value;
  const compania  = document.getElementById('f-compania').value.trim();
  const asegurado = document.getElementById('f-asegurado').value.trim();
  if (!mes || !compania || !asegurado) { mostrarToast('Completá Mes, Compañía y Asegurado'); return; }

  const btn = document.getElementById('btn-guardar');
  btn.disabled = true; btn.textContent = 'Guardando...';

  const payload = {
    mes, compania, asegurado,
    poliza:    document.getElementById('f-poliza').value.trim(),
    renovador: document.getElementById('f-renovador').value.trim(),
    producto:  document.getElementById('f-producto').value.trim(),
    enviada:   document.getElementById('f-enviada').value,
    obs:       document.getElementById('f-obs').value.trim(),
  };

  try {
    if (editandoId) {
      await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({ action:'eliminar_renovacion', id: editandoId }) });
      payload.id = editandoId;
    }
    await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({ action:'agregar_renovacion', ...payload }) });
    cerrarModal();
    mostrarToast(editandoId ? 'Renovación actualizada ✓' : 'Renovación guardada ✓');
    setTimeout(() => cargarDatos(), 1800);
  } catch(e) { mostrarToast('Error al guardar. Reintentá.'); }

  btn.disabled = false; btn.textContent = 'Guardar';
}

async function eliminarRenovacion(id) {
  const r = renovaciones.find(x => x.id === id);
  if (!r || !confirm('¿Eliminás la renovación de "' + r.asegurado + '"?')) return;
  try {
    await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({ action:'eliminar_renovacion', id }) });
    mostrarToast('Renovación eliminada');
    setTimeout(() => cargarDatos(), 1800);
  } catch(e) { mostrarToast('Error al eliminar'); }
}

function mostrarToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3200);
}

document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) cerrarModal();
});

cargarDatos();
</script>
